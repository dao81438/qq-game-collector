<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QQ群联机游戏收集器</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #0f0f1a;
    --card-bg: #1a1a2e;
    --card-hover: #222240;
    --accent: #6c5ce7;
    --accent-glow: #a29bfe;
    --green: #00cec9;
    --green-bg: rgba(0, 206, 201, 0.15);
    --text: #e0e0e0;
    --text-dim: #888;
    --border: #2a2a45;
    --radius: 12px;
    --transition: 0.2s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(108, 92, 231, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(0, 206, 201, 0.06) 0%, transparent 50%);
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  .header {
    text-align: center;
    padding: 32px 0 20px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent-glow), var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .subtitle {
    color: var(--text-dim);
    margin-top: 6px;
    font-size: 14px;
  }

  .user-panel {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .user-panel label {
    font-weight: 600;
    font-size: 15px;
    white-space: nowrap;
  }
  .user-panel input {
    flex: 1;
    min-width: 160px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: var(--transition);
  }
  .user-panel input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
  }
  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover {
    background: #7c6cf0;
    transform: translateY(-1px);
  }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover {
    border-color: var(--accent);
    color: var(--accent-glow);
  }

  .current-user {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--green-bg);
    border: 1px solid rgba(0, 206, 201, 0.2);
    border-radius: var(--radius);
    margin-bottom: 20px;
