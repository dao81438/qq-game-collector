<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QQ群联机游戏收集器</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #0f0f1a;
    --card-bg: #1a1a2e;
    --card-hover: #222240;
    --accent: #6c5ce7;
    --accent-glow: #a29bfe;
    --green: #00cec9;
    --green-bg: rgba(0, 206, 201, 0.15);
    --text: #e0e0e0;
    --text-dim: #888;
    --border: #2a2a45;
    --radius: 12px;
    --transition: 0.2s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(108, 92, 231, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(0, 206, 201, 0.06) 0%, transparent 50%);
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  .header {
    text-align: center;
    padding: 32px 0 20px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent-glow), var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .subtitle {
    color: var(--text-dim);
    margin-top: 6px;
    font-size: 14px;
  }

  .user-panel {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .user-panel label {
    font-weight: 600;
    font-size: 15px;
    white-space: nowrap;
  }
  .user-panel input {
    flex: 1;
    min-width: 160px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: var(--transition);
  }
  .user-panel input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
  }
  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover {
    background: #7c6cf0;
    transform: translateY(-1px);
  }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover {
    border-color: var(--accent);
    color: var(--accent-glow);
  }

  .current-user {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--green-bg);
    border: 1px solid rgba(0, 206, 201, 0.2);
    border-radius: var(--radius);
    margin-bottom: 20px;
    font-size: 14px;
  }
  .current-user .name {
    font-weight: 700;
    color: var(--green);
  }
  .current-user .count {
    color: var(--text-dim);
    margin-left: auto;
  }

  .section-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .badge {
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
  }

  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin-bottom: 24px;
  }
  .game-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: var(--transition);
    user-select: none;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
  }
  .game-card:hover {
    border-color: var(--accent);
    background: var(--card-hover);
  }
  .game-card.selected {
    border-color: var(--green);
    background: var(--green-bg);
    box-shadow: 0 0 12px rgba(0, 206, 201, 0.08);
  }
  .game-card .checkbox {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
    flex-shrink: 0;
  }
  .game-card.selected .checkbox {
    background: var(--green);
    border-color: var(--green);
  }
  .game-card .checkbox::after {
    content: '✓';
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    transform: scale(0);
    transition: var(--transition);
  }
  .game-card.selected .checkbox::after {
    opacity: 1;
    transform: scale(1);
  }
  .game-card .game-name {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.3;
  }
  .game-card .player-count {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: auto;
    background: rgba(255,255,255,0.05);
    padding: 2px 8px;
    border-radius: 10px;
    flex-shrink: 0;
  }

  .add-game {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .add-game input {
    flex: 1;
    min-width: 200px;
    padding: 10px 14px;
    border: 1px dashed var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: var(--transition);
  }
  .add-game input:focus {
    border-style: solid;
    border-color: var(--accent);
  }

  .stats-panel {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .stats-body {
    padding: 16px 20px;
  }

  .game-stat-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .game-stat-row:last-child {
    border-bottom: none;
  }
  .game-stat-row .stat-game {
    font-weight: 600;
    font-size: 14px;
    min-width: 140px;
  }
  .game-stat-row .stat-players {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    flex: 1;
  }
  .game-stat-row .player-tag {
    background: rgba(108, 92, 231, 0.2);
    color: var(--accent-glow);
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: 500;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
  }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 4px;
    border: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-dim);
    transition: var(--transition);
  }
  .tab.active {
    background: var(--accent);
    color: #fff;
  }

  .loading-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(15,15,26,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    font-size: 18px;
    color: var(--accent-glow);
  }

  @media (max-width: 600px) {
    .game-grid {
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 8px;
    }
    .game-card {
      padding: 10px 12px;
    }
    .game-card .game-name {
      font-size: 13px;
    }
    .header h1 {
      font-size: 22px;
    }
    .user-panel {
      flex-direction: column;
      align-items: stretch;
    }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>QQ群联机游戏收集器</h1>
    <p class="subtitle">点选你拥有的游戏，看看谁和你玩一样的游戏！</p>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <span>正在连接...</span>
  </div>

  <div class="user-panel">
    <label>你的昵称：</label>
    <input type="text" id="userNameInput" placeholder="输入你的QQ昵称..." maxlength="20">
    <button class="btn btn-primary" onclick="setUserName()">确认</button>
  </div>

  <div class="current-user" id="currentUserBar" style="display:none">
    <span>当前用户：</span>
    <span class="name" id="displayName"></span>
    <span class="count" id="userGameCount"></span>
    <button class="btn btn-outline" style="font-size:12px;padding:4px 10px;margin-left:8px" onclick="logout()">切换</button>
  </div>

  <div class="tabs" id="tabs" style="display:none">
    <div class="tab active" data-tab="games" onclick="switchTab('games')">游戏列表</div>
    <div class="tab" data-tab="stats" onclick="switchTab('stats')">统计面板</div>
  </div>

  <div id="tab-games">
    <div class="section-title">选择你拥有的游戏 <span class="badge" id="totalGameCount">0</span></div>
    <div class="game-grid" id="gameGrid"></div>

    <div class="section-title">添加新游戏</div>
    <div class="add-game">
      <input type="text" id="newGameInput" placeholder="输入游戏名称，如：星露谷物语">
      <button class="btn btn-primary" onclick="addGame()">添加游戏</button>
    </div>
  </div>

  <div id="tab-stats" style="display:none">
    <div class="stats-panel">
      <div style="padding:16px 20px;border-bottom:1px solid var(--border)">
        <h3 style="font-size:16px;font-weight:700">游戏匹配统计</h3>
      </div>
      <div class="stats-body" id="statsBody"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://kgysvselbxanglsuufjf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtneXN2c2VsYnhhbmdsc3V1ZmpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0Nzg2MTIsImV4cCI6MjA5ODA1NDYxMn0.u8UaVthkyLYteN7kWz0bbaLNK_gh3cILyLZhpqYY1Yg';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let games = [];
let myGameIds = new Set();
let allUserGames = [];

async function init() {
  try {
    await loadAllData();
  } catch (e) {
    console.error('初始化失败:', e);
    document.getElementById('loadingOverlay').innerHTML =
      '<div style="text-align:center;padding:20px;">' +
        '<p style="font-size:18px;color:#e74c3c;margin-bottom:10px">连接失败</p>' +
        '<p style="font-size:13px;color:#888;">请检查网络连接或刷新重试</p>' +
        '<p style="font-size:11px;color:#888;margin-top:6px;">' + (e.message || '未知错误') + '</p>' +
        '<button class="btn btn-primary" style="margin-top:14px" onclick="location.reload()">刷新重试</button>' +
      '</div>';
    return;
  }

  const saved = localStorage.getItem('qqGameCollectorUser');
  if (saved) {
    currentUser = saved;
    document.getElementById('userNameInput').value = saved;
  }
  updateUI();

  document.getElementById('loadingOverlay').style.display = 'none';
}

async function loadAllData() {
  const { data: gameData, error: gameError } = await supabase
    .from('games')
    .select('*')
    .order('name');

  if (gameError) {
    console.error('加载游戏失败:', gameError);
    return;
  }

  const { data: ugData, error: ugError } = await supabase
    .from('user_games')
    .select('*');

  if (ugError) {
    console.error('加载用户选择失败:', ugError);
    return;
  }

  allUserGames = ugData || [];

  const playerCountMap = {};
  for (const ug of allUserGames) {
    playerCountMap[ug.game_id] = (playerCountMap[ug.game_id] || 0) + 1;
  }

  games = (gameData || []).map(g => ({
    id: g.id,
    name: g.name,
    player_count: playerCountMap[g.id] || 0
  }));

  if (currentUser) {
    myGameIds = new Set(
      allUserGames
        .filter(ug => ug.user_name === currentUser)
        .map(ug => ug.game_id)
    );
  } else {
    myGameIds = new Set();
  }
}

function setUserName() {
  const input = document.getElementById('userNameInput');
  const name = input.value.trim();
  if (!name) {
    showToast('请输入昵称');
    return;
  }
  currentUser = name;
  localStorage.setItem('qqGameCollectorUser', name);
  myGameIds = new Set(
    allUserGames.filter(ug => ug.user_name === currentUser).map(ug => ug.game_id)
  );
  updateUI();
  showToast('已设置为「' + name + '」');
}

function logout() {
  currentUser = null;
  myGameIds = new Set();
  localStorage.removeItem('qqGameCollectorUser');
  document.getElementById('userNameInput').value = '';
  updateUI();
}

function renderGames() {
  const grid = document.getElementById('gameGrid');
  const sorted = [...games].sort((a, b) => {
    const aSel = myGameIds.has(a.id) ? 1 : 0;
    const bSel = myGameIds.has(b.id) ? 1 : 0;
    if (aSel !== bSel) return bSel - aSel;
    return a.name.localeCompare(b.name, 'zh');
  });

  grid.innerHTML = sorted.map(game => {
    const selected = myGameIds.has(game.id);
    return '<div class="game-card' + (selected ? ' selected' : '') + '" onclick="toggleGame(' + game.id + ')">' +
        '<div class="checkbox"></div>' +
        '<span class="game-name">' + escapeHtml(game.name) + '</span>' +
        (game.player_count > 0 ? '<span class="player-count">' + game.player_count + '人</span>' : '') +
      '</div>';
  }).join('');

  document.getElementById('totalGameCount').textContent = games.length;
}

async function toggleGame(gameId) {
  if (!currentUser) {
    showToast('请先输入你的昵称');
    return;
  }

  if (myGameIds.has(gameId)) {
    const { error } = await supabase
      .from('user_games')
      .delete()
      .eq('user_name', currentUser)
      .eq('game_id', gameId);

    if (error) {
      showToast('操作失败，请重试');
      return;
    }
    myGameIds.delete(gameId);
  } else {
    const { error } = await supabase
      .from('user_games')
      .insert({ user_name: currentUser, game_id: gameId });

    if (error) {
      showToast('操作失败，请重试');
      return;
    }
    myGameIds.add(gameId);
  }

  await loadAllData();
  updateUI();
}

async function addGame() {
  const input = document.getElementById('newGameInput');
  const name = input.value.trim();
  if (!name) {
    showToast('请输入游戏名称');
    return;
  }

  if (games.some(g => g.name === name)) {
    showToast('该游戏已存在');
    return;
  }

  const { error } = await supabase
    .from('games')
    .insert({ name });

  if (error) {
    if (error.code === '23505') {
      showToast('该游戏已存在');
    } else {
      showToast('添加失败，请重试');
    }
    return;
  }

  input.value = '';
  await loadAllData();
  updateUI();
  showToast('已添加「' + name + '」');
}

function renderStats() {
  const body = document.getElementById('statsBody');

  const stats = {};
  for (const game of games) {
    stats[game.id] = { name: game.name, players: [] };
  }
  for (const ug of allUserGames) {
    if (stats[ug.game_id]) {
      stats[ug.game_id].players.push(ug.user_name);
    }
  }

  const sorted = Object.values(stats)
    .filter(s => s.players.length > 0)
    .sort((a, b) => b.players.length - a.players.length);

  if (sorted.length === 0) {
    body.innerHTML = '<p style="color:#888;text-align:center;padding:20px">还没有人选择游戏，快来成为第一个吧！</p>';
    return;
  }

  body.innerHTML = sorted.map(s =>
    '<div class="game-stat-row">' +
      '<span class="stat-game">' + escapeHtml(s.name) + '</span>' +
      '<span class="stat-players">' +
        s.players.map(p => '<span class="player-tag">' + escapeHtml(p) + '</span>').join('') +
      '</span>' +
    '</div>'
  ).join('');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab[data-tab="' + tab + '"]').classList.add('active');
  document.getElementById('tab-games').style.display = tab === 'games' ? 'block' : 'none';
  document.getElementById('tab-stats').style.display = tab === 'stats' ? 'block' : 'none';
}

function updateUI() {
  const bar = document.getElementById('currentUserBar');
  const tabs = document.getElementById('tabs');

  if (currentUser) {
    bar.style.display = 'flex';
    tabs.style.display = 'flex';
    document.getElementById('displayName').textContent = currentUser;
    document.getElementById('userGameCount').textContent = '已选择 ' + myGameIds.size + ' 款游戏';
  } else {
    bar.style.display = 'none';
    tabs.style.display = 'none';
  }
  renderGames();
  renderStats();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(function() { toast.classList.remove('show'); }, 2000);
}

document.getElementById('newGameInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addGame();
});
document.getElementById('userNameInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') setUserName();
});

init();

setInterval(loadAllData, 8000);
</script>
</body>
</html>
